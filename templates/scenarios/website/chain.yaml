name: "static_website_workflow"
description: "A chain to design, generate content, and build a static website."
pods:
  - name: "design"
    description: "Defines the layout, colors, and typography."
    template: "pod.design.yaml"
  - name: "content"
    description: "Generates copy for all pages."
    depends_on: "design"
    template: "pod.content.yaml"
  - name: "build"
    description: "Assembles HTML/CSS from design and content."
    depends_on: "content"
    template: "pod.build.yaml"
