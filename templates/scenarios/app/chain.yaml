name: "fullstack_app_workflow"
description: "A chain to generate a full-stack application (Backend API + Frontend UI)."
pods:
  - name: "data_model"
    description: "Defines the database schema and entity relationships."
    template: "pod.datamodel.yaml"
  - name: "backend_api"
    description: "Generates REST/GraphQL endpoints based on the data model."
    depends_on: "data_model"
    template: "pod.backend.yaml"
  - name: "frontend_ui"
    description: "Generates screens and components based on the API spec."
    depends_on: "backend_api"
    template: "pod.frontend.yaml"
  - name: "e2e_test"
    description: "Runs end-to-end tests across the full stack."
    depends_on: "frontend_ui"
    template: "pod.e2e.yaml"
