name: "software_dev_workflow"
description: "A chain to spec, code, and test a software component."
pods:
  - name: "specification"
    description: "Defines requirements and API signatures."
    template: "pod.spec.yaml"
  - name: "implementation"
    description: "Writes the source code."
    depends_on: "specification"
    template: "pod.code.yaml"
  - name: "testing"
    description: "Runs unit tests and linting."
    depends_on: "implementation"
    template: "pod.test.yaml"
