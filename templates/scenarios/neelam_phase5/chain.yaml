name: "neelam_phase5_governance_chain"
description: "Industrial governance chain for Phase 5 Staging Integration (Neelam Carbon)."
pods:
  - name: "prerequisite_verification"
    description: "Verifies Phase 4 baseline and Infrastructure authorization."
    template: "pod.prereq.yaml"
  - name: "cloud_run_deployment"
    description: "Deploys the Synthetic Intake Prototype (Operation A) to GCP Staging."
    depends_on: "prerequisite_verification"
    template: "pod.deploy.yaml"
  - name: "bucket_integration_test"
    description: "Verifies synthetic artifact uploads to neelam-evidence-raw-staging."
    depends_on: "cloud_run_deployment"
    template: "pod.bucket.yaml"
  - name: "identity_audit"
    description: "Audit of service account and mTLS handshake logs."
    depends_on: "bucket_integration_test"
    template: "pod.audit.yaml"
